<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LED Matrix Display - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="absolute inset-0 -z-10 overflow-hidden">
        <div class="absolute left-[-8rem] top-[-8rem] h-72 w-72 rounded-full bg-cyan-500/20 blur-3xl"></div>
        <div class="absolute right-[-6rem] top-40 h-80 w-80 rounded-full bg-fuchsia-500/10 blur-3xl"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(15,23,42,0.9),rgba(2,6,23,1)_68%)]"></div>
    </div>

    <main id="app" class="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-4 px-4 py-6 sm:px-6 lg:px-8">
        <header class="rounded-3xl border border-slate-800/80 bg-slate-900/75 px-6 py-5 shadow-2xl backdrop-blur-xl">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-semibold uppercase tracking-[0.35em] text-cyan-300/80">LED Matrix Display</p>
                    <div class="mt-2">
                        <div class="flex items-center gap-2">
                            <button class="tab-btn rounded-xl border border-slate-700 bg-slate-800/50 px-4 py-2 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:bg-slate-700" data-tab="control">Control</button>
                            <button class="tab-btn rounded-xl border border-slate-700 bg-slate-800/50 px-4 py-2 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:bg-slate-700" data-tab="animation-maker">Animation Maker</button>
                            <button class="tab-btn rounded-xl border border-cyan-400/30 bg-cyan-500/20 px-4 py-2 text-sm font-semibold text-cyan-100 transition hover:bg-cyan-500/30" data-tab="marketplace">Marketplace</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid gap-4 md:grid-cols-2">
            <section class="rounded-2xl border border-slate-800/80 bg-slate-900/80 p-5 shadow-2xl backdrop-blur-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-white">Community Animations</h3>
                    <button id="refresh-market" class="rounded-xl border border-cyan-400/20 bg-cyan-500/15 px-3 py-1 text-sm font-semibold text-cyan-100 transition hover:bg-cyan-500/25">Refresh</button>
                </div>
                <div id="market-list" class="space-y-3 max-h-[600px] overflow-auto">
                    <p class="text-sm text-slate-400">Loading marketplace data...</p>
                </div>
            </section>

            <section class="rounded-2xl border border-slate-800/80 bg-slate-900/80 p-5 shadow-2xl backdrop-blur-xl">
                <h3 class="text-lg font-semibold text-white mb-4">Share Your Animations</h3>
                <div id="local-list" class="space-y-3 max-h-[600px] overflow-auto">
                    </div>
            </section>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script type="module" src="js/marketplace.js"></script>
    <script>
        // Tab switching logic
        document.addEventListener('DOMContentLoaded', () => {
            const tabButtons = document.querySelectorAll('.tab-btn');

            tabButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    if (tab === 'control') window.location.href = '/';
                    else if (tab === 'animation-maker') window.location.href = '/animation-maker.html';
                    else if (tab === 'marketplace') window.location.href = '/marketplace.html';
                });
            });
        });
    </script>
</body>
</html>
