<!doctype html>
<html lang="hu">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LED Matrix Disp - Web UI</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app" class="container">
        <h1>LED Matrix Disp - Web UI</h1>
        <section class="card">
            <label>Serial port:</label>
            <select id="ports"></select>
            <button id="refresh">Refresh</button>
            <button id="connect">Connect</button>
            <button id="disconnect">Disconnect</button>
            <div id="status">Disconnected</div>
        </section>

        <section class="card">
            <label>Pattern:</label>
            <select id="pattern">
                <option value="0">0 - Static color</option>
                <option value="1">1 - Rainbow</option>
                <option value="2">2 - Theater chase</option>
                <option value="3">3 - Scanner</option>
                <option value="4">4 - Color wipe</option>
            </select>
        </section>

        <section class="card">
            <label>Color (R G B):</label>
            <input id="r" type="number" min="0" max="255" value="255">
            <input id="g" type="number" min="0" max="255" value="255">
            <input id="b" type="number" min="0" max="255" value="255">
        </section>

        <section class="card">
            <label>Brightness:</label>
            <input id="brightness" type="range" min="0" max="255" value="128">
        </section>

        <!-- command buttons removed -->

        <section class="card">
            <div style="display:flex; gap:12px; align-items:flex-start; width:100%;">
                <div style="flex:1;">
                    <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
                        <h3 style="margin:0;">Console</h3>
                        <button id="toggle-console" style="padding:4px 8px; font-size:12px;">Hide</button>
                    </div>
                    <pre id="console" class="console" style="display:block;"></pre>
                </div>
                <div style="width:300px;">
                    <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
                        <h3 style="margin:0;">Preview</h3>
                        <button id="toggle-preview" style="padding:4px 8px; font-size:12px;">Hide</button>
                    </div>
                    <canvas id="preview" width="240" height="240"
                        style="width:100%; background:#000; border-radius:6px; display:block;"></canvas>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
