<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LED Matrix Disp - Web UI</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app" class="container">
        <h1>LED Matrix Disp - Web UI</h1>
        <div class="layout">
            <div class="controls-column">
                <section class="card collapsible-card" data-card-id="serial">
                    <div class="panel-header">
                        <h3>Serial port</h3>
                           <button type="button" class="toggle-btn card-toggle" aria-expanded="true">Collapse</button>
                    </div>
                    <div class="card-body card-body-inline">
                        <select id="ports"></select>
                        <button id="refresh">Refresh</button>
                        <button id="connect">Connect</button>
                        <button id="disconnect">Disconnect</button>
                        <div id="status">Disconnected</div>
                    </div>
                </section>

                <section class="card collapsible-card" data-card-id="pattern">
                    <div class="panel-header">
                        <h3>Pattern</h3>
                           <button type="button" class="toggle-btn card-toggle" aria-expanded="true">Collapse</button>
                    </div>
                    <div class="card-body">
                        <div class="pattern-group" role="group" aria-label="Pattern selection">
                            <button type="button" class="pattern-btn active" data-pattern="0">Static color</button>
                            <button type="button" class="pattern-btn" data-pattern="1">Rainbow</button>
                            <button type="button" class="pattern-btn" data-pattern="2">Theater chase</button>
                            <button type="button" class="pattern-btn" data-pattern="3">Scanner</button>
                            <button type="button" class="pattern-btn" data-pattern="4">Color wipe</button>
                            <button type="button" class="pattern-btn" data-pattern="5">Pulse</button>
                            <button type="button" class="pattern-btn" data-pattern="6">Checker</button>
                        </div>
                    </div>
                </section>

                <section class="card collapsible-card" data-card-id="color">
                    <div class="panel-header">
                        <h3>Color</h3>
                           <button type="button" class="toggle-btn card-toggle" aria-expanded="true">Collapse</button>
                    </div>
                    <div class="card-body card-body-inline color-controls">
                        <div class="color-mode">
                            <button type="button" class="color-mode-btn active" data-mode="rgb">RGB</button>
                            <button type="button" class="color-mode-btn" data-mode="hex">Hex</button>
                        </div>
                        <div class="color-pickers">
                            <input id="os-color-picker" type="color" title="Open OS color picker">
                        </div>
                        <div class="color-inputs rgb-inputs">
                            <input id="r" type="number" min="0" max="255" value="255">
                            <input id="g" type="number" min="0" max="255" value="20">
                            <input id="b" type="number" min="0" max="255" value="255">
                        </div>
                        <div class="color-inputs hex-inputs" style="display:none;">
                            <input id="hex" type="text" maxlength="7" value="#ff14ff">
                        </div>
                    </div>
                </section>

                <section class="card collapsible-card" data-card-id="brightness">
                    <div class="panel-header">
                        <h3>Brightness</h3>
                           <button type="button" class="toggle-btn card-toggle" aria-expanded="true">Collapse</button>
                    </div>
                    <div class="card-body card-body-inline">
                        <input id="brightness" type="range" min="0" max="255" value="255">
                    </div>
                </section>

                <section class="card collapsible-card" data-card-id="strobe">
                    <div class="strobe-header">
                        <h3>Strobe</h3>
                        <button id="strobe-toggle" type="button" class="strobe-toggle-btn" aria-pressed="false">Strobe
                            off</button>
                        <button type="button" class="toggle-btn card-toggle" aria-expanded="true">Collapse</button>
                    </div>
                    <div class="card-body strobe-grid">
                        <div class="strobe-sliders">
                            <div>
                                <label>Speed: <span id="strobe-speed-val">8 Hz</span></label>
                                <input id="strobe-speed" type="range" min="1" max="20" value="8">
                            </div>
                            <div>
                                <label>Fill %</label>
                                <input id="strobe-duty" type="range" min="1" max="99" value="50">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card panel-card collapsible-card" data-card-id="console">
                    <div class="panel-header">
                        <h3>Console</h3>
                        <div class="panel-actions"><button id="toggle-console" class="toggle-btn card-toggle"
                                   aria-label="Collapse console" aria-expanded="true">Collapse</button></div>
                    </div>
                    <div class="card-body">
                        <pre id="console" class="console" style="display:block;"></pre>
                    </div>
                </section>
            </div>

            <aside class="preview-column">
                <section class="card panel-card preview-card collapsible-card" data-card-id="preview">
                    <div class="panel-header">
                        <h3>Preview</h3>
                        <div class="panel-actions"><button id="toggle-preview" class="toggle-btn card-toggle"
                                   aria-label="Collapse preview" aria-expanded="true">Collapse</button></div>
                    </div>
                    <div class="card-body">
                        <canvas id="preview" width="240" height="240"></canvas>
                    </div>
                </section>
            </aside>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
