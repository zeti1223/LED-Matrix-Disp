<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LED Matrix Disp - Web UI</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app" class="container">
        <h1>LED Matrix Disp - Web UI</h1>
        <div class="layout">
            <div class="controls-column">
                <section class="card">
                    <label>Serial port:</label>
                    <select id="ports"></select>
                    <button id="refresh">Refresh</button>
                    <button id="connect">Connect</button>
                    <button id="disconnect">Disconnect</button>
                    <div id="status">Disconnected</div>
                </section>

                <section class="card">
                    <label>Pattern:</label>
                    <div class="pattern-group" role="group" aria-label="Pattern selection">
                        <button type="button" class="pattern-btn active" data-pattern="0">Static color</button>
                        <button type="button" class="pattern-btn" data-pattern="1">Rainbow</button>
                        <button type="button" class="pattern-btn" data-pattern="2">Theater chase</button>
                        <button type="button" class="pattern-btn" data-pattern="3">Scanner</button>
                        <button type="button" class="pattern-btn" data-pattern="4">Color wipe</button>
                    </div>
                </section>

                <section class="card">
                    <label>Color (R G B):</label>
                    <input id="r" type="number" min="0" max="255" value="255">
                    <input id="g" type="number" min="0" max="255" value="255">
                    <input id="b" type="number" min="0" max="255" value="255">
                </section>

                <section class="card">
                    <label>Brightness:</label>
                    <input id="brightness" type="range" min="0" max="255" value="255">
                </section>

                <section class="card">
                    <label>Strobe</label>
                    <div class="strobe-grid">
                        <label class="strobe-toggle">
                            <input id="strobe-on" type="checkbox">
                            <span>Strobe enabled</span>
                        </label>
                        <div class="strobe-sliders">
                            <div>
                                <label>Speed: <span id="strobe-speed-val">8 Hz</span></label>
                                <input id="strobe-speed" type="range" min="1" max="20" value="8">
                            </div>
                            <div>
                                <label>Fill %</label>
                                <input id="strobe-duty" type="range" min="1" max="99" value="50">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card panel-card">
                    <div class="panel-header">
                        <h3>Console</h3>
                        <div class="panel-actions"><button id="toggle-console" class="toggle-btn" aria-label="toggle console">Hide</button></div>
                    </div>
                    <pre id="console" class="console" style="display:block;"></pre>
                </section>
            </div>

            <aside class="preview-column">
                <section class="card panel-card preview-card">
                    <div class="panel-header">
                        <h3>Preview</h3>
                        <div class="panel-actions"><button id="toggle-preview" class="toggle-btn" aria-label="toggle preview">Hide</button></div>
                    </div>
                    <canvas id="preview" width="240" height="240"></canvas>
                </section>
            </aside>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
